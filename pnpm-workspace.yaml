# ════════════════════════════════════════════════════════════════
# pnpm-workspace.yaml — تعريف مساحات العمل في الـ Monorepo
# ────────────────────────────────────────────────────────────────
# pnpm يربط الحزم محلياً (symlinks) فلا تكرار، وتثبيت واحد للكل.
# أي مجلد ضمن هذه الأنماط يُعامَل كحزمة مستقلة لها package.json.
# ════════════════════════════════════════════════════════════════
packages:
  - 'apps/*'          # الواجهات النهائية (4 تطبيقات حالياً)
  - 'packages/*'      # الحزم المشتركة (ui, core, firebase-client...)
  - 'planets/*'       # الكواكب الـ14 (تُضاف تدريجياً)
  - 'protocols/*'     # البروتوكولات (إعادة توزيع الفائض...)
  - 'services/*'      # خدمات الخلفية (Cloud Functions)
